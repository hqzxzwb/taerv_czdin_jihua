<script>
// ── Embedded dictionary data ──
const LINK_PREFIX = "https://github.com/hqzxzwb/taerv_czdin_jihua/blob/master/";
const DATA = __DATA_JSON__;
const RECENT_DATA = __RECENT_DATA_JSON__;
const SOURCE_NAMES = __SOURCE_NAMES_JSON__;

// ── Search logic ──
const input = document.getElementById('q');
const headOnlyToggle = document.getElementById('headOnlyToggle');
const regionSelect = document.getElementById('region');
const resultsList = document.getElementById('results');
const stats = document.getElementById('stats');
const loadMoreSentinel = document.getElementById('loadMoreSentinel');
const totalEntryCount = document.getElementById('totalEntryCount');
const DEFAULT_PLACEHOLDER = '例：摞 / lu6 / 叠放';
let renderTaskToken = 0;
const LAZY_BATCH_SIZE = 80;
let loadMoreObserver = null;
let headOnlyMode = false;

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Entry array indices
const W = 0, P = 1, M = 2, T = 3, S = 4;
const REGION_TO_SOURCE_ID = Object.fromEntries(SOURCE_NAMES.map((name, i) => [name, i]));
const DEFAULT_SOURCE_ID = REGION_TO_SOURCE_ID['通用'] ?? 0;

function normalizeSourceId(source) {
  if (typeof source === 'number' && Number.isFinite(source)) return source;
  if (typeof source === 'string' && /^\d+$/.test(source)) return Number.parseInt(source, 10);
  if (typeof source === 'string' && Object.prototype.hasOwnProperty.call(REGION_TO_SOURCE_ID, source)) {
    return REGION_TO_SOURCE_ID[source];
  }
  return DEFAULT_SOURCE_ID;
}

function sourceNameById(sourceId) {
  return SOURCE_NAMES[sourceId] || SOURCE_NAMES[DEFAULT_SOURCE_ID] || '通用';
}

function entrySourceIds(entry) {
  return (entry[S] || []).map(normalizeSourceId);
}

function initReferenceCounts() {
  const counts = new Array(SOURCE_NAMES.length).fill(0);
  for (const entry of DATA) {
    const ids = [...new Set(entrySourceIds(entry))];
    for (const id of ids) {
      if (id >= 0 && id < counts.length) {
        counts[id] += 1;
      }
    }
  }

  for (const el of document.querySelectorAll('.ref-count[data-source-name]')) {
    const sourceName = el.getAttribute('data-source-name') || '';
    const sourceId = REGION_TO_SOURCE_ID[sourceName];
    const count = Number.isInteger(sourceId) ? counts[sourceId] : 0;
    el.textContent = `（${count}）`;
  }
}

function entryLink(entry) {
  // Derive filename from first pinyin reading: strip tone digits, replace spaces with _
  const firstReading = formatPinyinDisplay(entry[P].split(',')[0].trim());
  const filename = firstReading.replace(/[0-9]/g, '').replace(/ +/g, '_');
  const dir = filename[0].toLowerCase();
  const anchor = entry[T];
  return dir + '/' + filename + '.md#' + anchor;
}

function formatPinyinDisplay(pinyin) {
  return pinyin.replace(/([0-9])([A-Za-z])/g, '$1 $2');
}

function pinyinTokens(pinyin) {
  return pinyin.toLowerCase().replace(/,/g, ' ').match(/[a-z]+[0-9]?/g) || [];
}

function fmtWord(raw) {
  // ʰ marks a ligature: underline the two chars before ʰ, hide ʰ itself
  let s = raw.replace(/(.)(.)ʰ/g, '$1<span class="head-coart-link">\u035C</span>$2');
  // ʳ replaces erhua 儿: render as subscript 儿
  s = s.replace(/\u02b3/g, '<sub>儿</sub>');
  return s;
}

function highlight(text, terms) {
  if (!terms.length) return text;
  const pattern = new RegExp('(' + terms.map(escapeRe).join('|') + ')', 'gi');
  // Split on HTML tags, escape and highlight only text nodes
  return text.split(/(<[^>]+>)/).map(part => {
    if (part.startsWith('<')) return part; // keep tags as-is
    const escaped = part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return escaped.replace(pattern, '<mark>$1</mark>');
  }).join('');
}

function renderMeaning(text) {
  // Convert stored {example} blocks to styled inline code
  return text.replace(/\{([^{}]+)\}/g, '<span class="entry-example">$1</span>');
}

function score(entry, terms) {
  // Return a relevance score; higher is better
  let s = 0;
  const pinyinRawLower = entry[P].toLowerCase();
  const pinyinShownLower = formatPinyinDisplay(entry[P]).toLowerCase();
  for (const t of terms) {
    const tl = t.toLowerCase();
    const w = entry[W].replace(/\u02b0/g, '').replace(/\u02b3/g, '儿');
    const wNoR = entry[W].replace(/[\u02b0\u02b3]/g, '');
    if (w.includes(t) || wNoR.includes(t)) s += 10;
    if (pinyinRawLower.includes(tl) || pinyinShownLower.includes(tl)) s += 5;
    if (entry[M].includes(t)) s += 1;
  }
  return s;
}

function disconnectLazyObserver() {
  if (loadMoreObserver) {
    loadMoreObserver.disconnect();
    loadMoreObserver = null;
  }
}

function clearLazyState() {
  disconnectLazyObserver();
  loadMoreSentinel.style.display = 'none';
}

function renderEntry(entry, terms) {
  const li = document.createElement('li');

  const wordSpan = document.createElement('span');
  wordSpan.className = 'entry-word';

  const wordLink = document.createElement('a');
  wordLink.href = LINK_PREFIX + entryLink(entry);
  wordLink.target = '_blank';
  wordLink.rel = 'noopener';
  wordLink.innerHTML = highlight(fmtWord(entry[W]), terms);
  wordSpan.appendChild(wordLink);

  const pinyinCode = document.createElement('code');
  pinyinCode.className = 'entry-pinyin';
  pinyinCode.innerHTML = highlight(formatPinyinDisplay(entry[P]), terms);

  const sourcesSpan = document.createElement('span');
  sourcesSpan.className = 'entry-sources';
  for (const srcId of entrySourceIds(entry)) {
    const srcName = sourceNameById(srcId);
    const tag = document.createElement('span');
    tag.className = 'entry-source-tag src-' + srcName;
    tag.textContent = srcName;
    sourcesSpan.appendChild(tag);
  }

  const meaningDiv = document.createElement('div');
  meaningDiv.className = 'entry-meaning';
  meaningDiv.innerHTML = highlight(renderMeaning(entry[M]), terms);

  const header = document.createElement('div');
  header.appendChild(wordSpan);
  header.appendChild(document.createTextNode(' '));
  header.appendChild(pinyinCode);
  header.appendChild(sourcesSpan);

  li.appendChild(header);
  li.appendChild(meaningDiv);
  return li;
}

function search(query) {
  const taskToken = ++renderTaskToken;
  query = query.trim();

  // Split on whitespace for multi-term search
  const terms = query.split(/\s+/).filter(Boolean);
  const hasQuery = terms.length > 0;

  // If query is purely pinyin-like (letters + digits only), use syllable-aware matching:
  // split both query and pinyin by spaces, require query tokens to appear as a
  // consecutive subsequence in pinyin tokens where each query token is a prefix
  // of the corresponding pinyin token (e.g. "fen m" matches "fen1 men2" but not "ben fen").
  const isPinyinPhrase = hasQuery && /^[a-zA-Z0-9 ]+$/.test(query);
  const pinyinTerms = isPinyinPhrase ? terms.map(t => t.toLowerCase()) : null;

  const region = regionSelect.value;
  const regionId = region ? REGION_TO_SOURCE_ID[region] : null;
  const headOnly = headOnlyMode;
  const letter = activeLetter;

  const matches = [];
  for (const entry of DATA) {
    // Filter by region
    if (regionId !== null && !entrySourceIds(entry).includes(regionId)) continue;

    // Filter by initial letter of pinyin
    if (letter && entry[P][0].toUpperCase() !== letter) continue;

    const combined = entry[W].replace(/\u02b0/g, '').replace(/\u02b3/g, '儿') + ' ' + entry[P] + ' ' + entry[M];
    const combinedNoR = entry[W].replace(/[\u02b0\u02b3]/g, '') + ' ' + entry[P] + ' ' + entry[M];
    const combinedLower = combined.toLowerCase();
    const combinedNoRLower = combinedNoR.toLowerCase();

    // For pinyin queries, require query tokens to appear consecutively in the
    // pinyin token list, each as a prefix of the corresponding pinyin syllable.
    if (pinyinTerms) {
      const pyTokens = pinyinTokens(entry[P]);
      let found = false;
      for (let i = 0; i <= pyTokens.length - pinyinTerms.length; i++) {
        if (pinyinTerms.every((qt, j) => pyTokens[i + j].startsWith(qt))) {
          found = true;
          break;
        }
      }
      if (!found) continue;
    } else if (hasQuery) {
      // Non-pinyin query: if headOnly is checked, only match entry headword.
      const allMatch = terms.every(t => {
        const tl = t.toLowerCase();
        if (headOnly) {
          const wordLower = entry[W].replace(/\u02b0/g, '').replace(/\u02b3/g, '儿').toLowerCase();
          const wordNoRLower = entry[W].replace(/[\u02b0\u02b3]/g, '').toLowerCase();
          return wordLower.includes(tl) || wordNoRLower.includes(tl);
        }
        return combinedLower.includes(tl) || combinedNoRLower.includes(tl);
      });
      if (!allMatch) continue;
    }

    matches.push({ entry, s: score(entry, terms) });
  }

  // Sort by score descending, then by word length ascending (only when query exists)
  if (hasQuery) {
    matches.sort((a, b) => b.s - a.s || a.entry[W].length - b.entry[W].length);
  }

  const letterHint = letter ? `【${letter}】` : '';

  if (matches.length === 0) {
    clearLazyState();
    resultsList.innerHTML = '<li class="no-results">未找到相关词条。</li>';
    stats.textContent = `${letterHint}${query ? `搜索"${query}"，` : ''}共 0 条词语。`;
    return;
  }

  const shown = matches.map(item => item.entry);
  resultsList.innerHTML = '';
  const baseStats = `${letterHint}${query ? `搜索"${query}"，` : ''}找到 ${shown.length} 条词语`;
  let rendered = 0;

  function updateStats() {
    stats.textContent = `${baseStats}。`;
  }

  function loadNextBatch() {
    if (taskToken !== renderTaskToken) return;
    if (rendered >= shown.length) {
      clearLazyState();
      updateStats();
      return;
    }

    const end = Math.min(rendered + LAZY_BATCH_SIZE, shown.length);
    const fragment = document.createDocumentFragment();
    for (let i = rendered; i < end; i++) {
      fragment.appendChild(renderEntry(shown[i], terms));
    }
    resultsList.appendChild(fragment);
    rendered = end;
    updateStats();

    if (rendered >= shown.length) {
      clearLazyState();
    }
  }

  disconnectLazyObserver();
  loadMoreSentinel.style.display = 'block';
  loadMoreObserver = new IntersectionObserver((entries) => {
    if (taskToken !== renderTaskToken) return;
    if (entries.some(entry => entry.isIntersecting)) {
      loadNextBatch();
    }
  }, {
    root: null,
    rootMargin: '300px 0px',
    threshold: 0,
  });
  loadMoreObserver.observe(loadMoreSentinel);

  loadNextBatch();
}

// Alpha-bar navigation
let activeLetter = null;
document.getElementById('alphaBar').addEventListener('click', e => {
  const randomBtn = e.target.closest('#randomBtn');
  if (randomBtn) {
    e.preventDefault();
    clearLazyState();
    // Show 10 random entries
    if (DATA.length === 0) return;
    input.value = '';
    activeLetter = null;
    regionSelect.value = '';
    document.querySelectorAll('#alphaBar a.active').forEach(el => el.classList.remove('active'));
    // Get 10 random entries
    const randomIndices = new Set();
    while (randomIndices.size < Math.min(10, DATA.length)) {
      randomIndices.add(Math.floor(Math.random() * DATA.length));
    }
    // Display random entries
    resultsList.innerHTML = '';
    for (const idx of randomIndices) {
      const entry = DATA[idx];
      const li = document.createElement('li');
      const wordSpan = document.createElement('span');
      wordSpan.className = 'entry-word';
      const wordLink = document.createElement('a');
      wordLink.href = LINK_PREFIX + entryLink(entry);
      wordLink.target = '_blank';
      wordLink.rel = 'noopener';
      wordLink.innerHTML = fmtWord(entry[W]);
      wordSpan.appendChild(wordLink);
      const pinyinCode = document.createElement('code');
      pinyinCode.className = 'entry-pinyin';
      pinyinCode.innerHTML = formatPinyinDisplay(entry[P]);
      const sourcesSpan = document.createElement('span');
      sourcesSpan.className = 'entry-sources';
      for (const srcId of entrySourceIds(entry)) {
        const srcName = sourceNameById(srcId);
        const tag = document.createElement('span');
        tag.className = 'entry-source-tag src-' + srcName;
        tag.textContent = srcName;
        sourcesSpan.appendChild(tag);
      }
      const meaningDiv = document.createElement('div');
      meaningDiv.className = 'entry-meaning';
      meaningDiv.innerHTML = renderMeaning(entry[M]);
      const header = document.createElement('div');
      header.appendChild(wordSpan);
      header.appendChild(document.createTextNode(' '));
      header.appendChild(pinyinCode);
      header.appendChild(sourcesSpan);
      li.appendChild(header);
      li.appendChild(meaningDiv);
      resultsList.appendChild(li);
    }
    stats.textContent = `随机词条`;
    return;
  }

  const recentBtn = e.target.closest('#recentBtn');
  if (recentBtn) {
    e.preventDefault();
    clearLazyState();
    // Show recently modified entries
    if (RECENT_DATA.length === 0) {
      stats.textContent = '暂无最近修改的词条';
      resultsList.innerHTML = '';
      return;
    }
    input.value = '';
    activeLetter = null;
    regionSelect.value = '';
    document.querySelectorAll('#alphaBar a.active').forEach(el => el.classList.remove('active'));
    // Display recent entries by indices
    resultsList.innerHTML = '';
    for (const idx of RECENT_DATA) {
      const entry = DATA[idx];
      const li = document.createElement('li');
      const wordSpan = document.createElement('span');
      wordSpan.className = 'entry-word';
      const wordLink = document.createElement('a');
      wordLink.href = LINK_PREFIX + entryLink(entry);
      wordLink.target = '_blank';
      wordLink.rel = 'noopener';
      wordLink.innerHTML = fmtWord(entry[W]);
      wordSpan.appendChild(wordLink);
      const pinyinCode = document.createElement('code');
      pinyinCode.className = 'entry-pinyin';
      pinyinCode.innerHTML = formatPinyinDisplay(entry[P]);
      const sourcesSpan = document.createElement('span');
      sourcesSpan.className = 'entry-sources';
      for (const srcId of entrySourceIds(entry)) {
        const srcName = sourceNameById(srcId);
        const tag = document.createElement('span');
        tag.className = 'entry-source-tag src-' + srcName;
        tag.textContent = srcName;
        sourcesSpan.appendChild(tag);
      }
      const meaningDiv = document.createElement('div');
      meaningDiv.className = 'entry-meaning';
      meaningDiv.innerHTML = renderMeaning(entry[M]);
      const header = document.createElement('div');
      header.appendChild(wordSpan);
      header.appendChild(document.createTextNode(' '));
      header.appendChild(pinyinCode);
      header.appendChild(sourcesSpan);
      li.appendChild(header);
      li.appendChild(meaningDiv);
      resultsList.appendChild(li);
    }
    stats.textContent = `最近修改的 ${RECENT_DATA.length} 条词语`;
    return;
  }
  
  const a = e.target.closest('a[data-letter]');
  if (!a) return;
  e.preventDefault();
  const letter = a.dataset.letter;
  if (activeLetter === letter) {
    // Click same letter again to deactivate
    activeLetter = null;
    a.classList.remove('active');
  } else {
    document.querySelectorAll('#alphaBar a.active').forEach(el => el.classList.remove('active'));
    activeLetter = letter;
    a.classList.add('active');
  }
  triggerSearch();
});

// Debounce input
let timer;
function triggerSearch() {
  clearTimeout(timer);
  timer = setTimeout(() => search(input.value), 200);
}
input.addEventListener('input', triggerSearch);
headOnlyToggle.addEventListener('click', () => {
  headOnlyMode = !headOnlyMode;
  headOnlyToggle.classList.toggle('active', headOnlyMode);
  headOnlyToggle.setAttribute('aria-pressed', headOnlyMode ? 'true' : 'false');
  triggerSearch();
});
regionSelect.addEventListener('change', triggerSearch);

// Init stats
stats.textContent = `共收录 ${DATA.length} 个词，请输入关键词搜索或点击音序。`;
if (totalEntryCount) {
  totalEntryCount.textContent = `（${DATA.length}条词）`;
}
initReferenceCounts();
input.placeholder = DEFAULT_PLACEHOLDER;
input.disabled = false;
headOnlyToggle.disabled = false;
regionSelect.disabled = false;

// Support URL ?q= parameter
const urlParams = new URLSearchParams(window.location.search);
const initialQuery = urlParams.get('q');
if (initialQuery) {
  input.value = initialQuery;
  search(initialQuery);
} else {
  search('');
}
</script>
